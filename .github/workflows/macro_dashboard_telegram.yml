name: Macro Dashboard Telegram

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macro-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r projects/spy_risk_monitor_macro_enhanced/requirements.txt

      - name: Fetch dashboard data
        working-directory: projects/spy_risk_monitor_macro_enhanced
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python fetch_data.py

      - name: Run macro dashboard
        working-directory: projects/spy_risk_monitor_macro_enhanced
        run: |
          python macro_enhanced_spy_dashboard_standalone.py \
            --base-dir . \
            --output-dir outputs/macro_enhanced_spy_dashboard_standalone

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python shared/send_telegram_report.py \
            --message-file projects/spy_risk_monitor_macro_enhanced/outputs/macro_enhanced_spy_dashboard_standalone/github_action_summary.html \
            --parse-mode HTML

      - name: Commit updated data and outputs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add projects/spy_risk_monitor_macro_enhanced/data
          git add projects/spy_risk_monitor_macro_enhanced/outputs

          if git diff --cached --quiet; then
            echo "No data or output changes to commit."
          else
            git commit -m "Update macro dashboard data and outputs"
            git push
          fi
